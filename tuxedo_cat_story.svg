<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 92">
  <rect x="0" y="54" width="700" height="1.5" fill="#8a8a8a" opacity="0.8"/>

  <g transform="translate(300,0)" stroke="#6b6b6b" stroke-width="0.6">
    <g>
      <animateTransform attributeName="transform" type="translate"
        keyTimes="0;0.15;0.2625;0.375;0.4875;0.60;0.85;1"
        values="0,0;0,0;40,0;80,0;120,0;160,0;0,0;0,0"
        calcMode="discrete" dur="8s" begin="0s" repeatCount="indefinite"/>

      <!-- ===== SLEEP POSE (curled, tail dangling below the line) ===== -->
      <g id="sleep">
        <animate attributeName="opacity"
          keyTimes="0;0.15;0.2625;0.375;0.4875;0.60;0.85;1"
          values="1;0;0;0;0;0;1;1"
          calcMode="discrete" dur="8s" begin="0s" repeatCount="indefinite"/>
        <rect x="24" y="24" width="48" height="30" fill="#141414"/>
        <rect x="66" y="18" width="18" height="18" fill="#141414"/>
        <rect x="70" y="12" width="5" height="6" fill="#141414"/>
        <rect x="78" y="12" width="5" height="6" fill="#141414"/>
        <rect x="48" y="42" width="18" height="6" fill="#f7f7f7"/>
        <rect x="66" y="42" width="6" height="6" fill="#f7f7f7"/>
        <rect x="18" y="36" width="6" height="18" fill="#141414"/>
        <rect x="18" y="54" width="6" height="18" fill="#141414"/>
        <g>
          <animateTransform attributeName="transform" type="rotate"
            values="-6 21 72; 6 21 72; -6 21 72" dur="3s" repeatCount="indefinite"/>
          <rect x="18" y="72" width="6" height="12" fill="#141414"/>
        </g>
      </g>

      <!-- ===== WALK POSE: shared body (legs animated separately) ===== -->
      <g id="walk-body">
        <animate attributeName="opacity"
          keyTimes="0;0.15;0.2625;0.375;0.4875;0.60;0.85;1"
          values="0;1;1;1;1;0;0;0"
          calcMode="discrete" dur="8s" begin="0s" repeatCount="indefinite"/>
        <rect x="12" y="24" width="12" height="6" fill="#141414"/>
        <rect x="0" y="30" width="12" height="6" fill="#141414"/>
        <rect x="24" y="18" width="72" height="24" fill="#141414"/>
        <rect x="90" y="6" width="24" height="24" fill="#141414"/>
        <rect x="94" y="0" width="6" height="6" fill="#141414"/>
        <rect x="106" y="0" width="6" height="6" fill="#141414"/>
        <rect x="84" y="24" width="6" height="12" fill="#f7f7f7"/>
        <rect x="30" y="36" width="54" height="6" fill="#f7f7f7"/>
        <rect x="104" y="14" width="3" height="3" fill="#bdeab0" stroke="none"/>
        <rect x="111" y="18" width="3" height="3" fill="#ff9eb0" stroke="none"/>
      </g>

      <g id="walk-legs-a">
        <animate attributeName="opacity"
          keyTimes="0;0.15;0.2625;0.375;0.4875;0.60;0.85;1"
          values="0;1;0;1;0;0;0;0"
          calcMode="discrete" dur="8s" begin="0s" repeatCount="indefinite"/>
        <rect x="90" y="42" width="6" height="12" fill="#141414"/>
        <rect x="90" y="48" width="6" height="6" fill="#f7f7f7"/>
        <rect x="30" y="42" width="6" height="12" fill="#141414"/>
        <rect x="30" y="48" width="6" height="6" fill="#f7f7f7"/>
      </g>

      <g id="walk-legs-b">
        <animate attributeName="opacity"
          keyTimes="0;0.15;0.2625;0.375;0.4875;0.60;0.85;1"
          values="0;0;1;0;1;0;0;0"
          calcMode="discrete" dur="8s" begin="0s" repeatCount="indefinite"/>
        <rect x="78" y="42" width="6" height="12" fill="#141414"/>
        <rect x="78" y="48" width="6" height="6" fill="#f7f7f7"/>
        <rect x="42" y="42" width="6" height="12" fill="#141414"/>
        <rect x="42" y="48" width="6" height="6" fill="#f7f7f7"/>
      </g>

      <!-- ===== STRETCH POSE ===== -->
      <g id="stretch">
        <animate attributeName="opacity"
          keyTimes="0;0.15;0.2625;0.375;0.4875;0.60;0.85;1"
          values="0;0;0;0;0;1;0;0"
          calcMode="discrete" dur="8s" begin="0s" repeatCount="indefinite"/>
        <rect x="12" y="6" width="12" height="6" fill="#141414"/>
        <rect x="6" y="0" width="6" height="6" fill="#141414"/>
        <rect x="24" y="6" width="36" height="24" fill="#141414"/>
        <rect x="54" y="30" width="36" height="12" fill="#141414"/>
        <rect x="84" y="36" width="24" height="18" fill="#141414"/>
        <rect x="88" y="30" width="6" height="6" fill="#141414"/>
        <rect x="100" y="30" width="6" height="6" fill="#141414"/>
        <rect x="36" y="30" width="6" height="24" fill="#141414"/>
        <rect x="36" y="48" width="6" height="6" fill="#f7f7f7"/>
        <rect x="90" y="48" width="24" height="6" fill="#141414"/>
        <rect x="108" y="48" width="6" height="6" fill="#f7f7f7"/>
        <rect x="66" y="36" width="18" height="6" fill="#f7f7f7"/>
        <rect x="98" y="42" width="3" height="3" fill="#bdeab0" stroke="none"/>
        <rect x="105" y="45" width="3" height="3" fill="#ff9eb0" stroke="none"/>
      </g>
    </g>
  </g>
</svg>
