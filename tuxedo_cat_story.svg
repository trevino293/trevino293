<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 90 650 160" width="650" height="160" shape-rendering="crispEdges">
  <style>
  .actor{ transform: translate(229px,104px); animation: move 28s linear infinite; }
  .p-sleep{ animation: sleepVis 28s step-end infinite; }
  .p-sit{ opacity:0; animation: sitVis 28s step-end infinite; }
  .p-stretch{ opacity:0; animation: stretchVis 28s step-end infinite; }
  .p-walkR{ opacity:0; animation: walkRVis 28s step-end infinite; }
  .p-walkL{ opacity:0; animation: walkLVis 28s step-end infinite; }
  .p-computer{ opacity:0; animation: computerVis 28s step-end infinite; }
  .breathe{ animation: breathe 3.2s ease-in-out infinite; }
  .sway{ transform-origin: 21px 72px; animation: sway 3s ease-in-out infinite; }
  .stretchb{ animation: stretchb 1.9s ease-in-out infinite; }
  .bob{ animation: bob 0.72s linear infinite; }
  .legA{ animation: legA 0.72s step-end infinite; }
  .legB{ opacity:0; animation: legB 0.72s step-end infinite; }
  .typeA{ animation: typeA 0.5s step-end infinite; }
  .typeB{ opacity:0; animation: typeB 0.5s step-end infinite; }
  .blink{ opacity:0; animation: blink 3.4s step-end infinite; }
  .zzz{ opacity:0; animation: sleepVis 28s step-end infinite; }
  .z1{ animation: rise 3s linear infinite; }
  .z2{ animation: rise 3s linear infinite; animation-delay: 1s; }
  .z3{ animation: rise 3s linear infinite; animation-delay: 2s; }
  @keyframes move{
    0%{transform:translate(229px,104px)} 9%{transform:translate(229px,104px)}
    13%{transform:translate(229px,104px)} 20%{transform:translate(418px,104px)}
    27%{transform:translate(418px,104px)} 28.5%{transform:translate(434px,88px)}
    30%{transform:translate(450px,96px)} 53%{transform:translate(450px,104px)}
    64%{transform:translate(40px,104px)} 68%{transform:translate(40px,104px)}
    76%{transform:translate(229px,104px)} 100%{transform:translate(229px,104px)} }
  @keyframes sleepVis{ 0%{opacity:1} 9%{opacity:0} 76%{opacity:1} 100%{opacity:1} }
  @keyframes sitVis{ 0%{opacity:0} 9%{opacity:1} 13%{opacity:0} 64%{opacity:1} 68%{opacity:0} 100%{opacity:0} }
  @keyframes stretchVis{ 0%{opacity:0} 20%{opacity:1} 27%{opacity:0} 100%{opacity:0} }
  @keyframes walkRVis{ 0%{opacity:0} 13%{opacity:1} 20%{opacity:0} 68%{opacity:1} 76%{opacity:0} 100%{opacity:0} }
  @keyframes walkLVis{ 0%{opacity:0} 53%{opacity:1} 64%{opacity:0} 100%{opacity:0} }
  @keyframes computerVis{ 0%{opacity:0} 27%{opacity:1} 53%{opacity:0} 100%{opacity:0} }
  @keyframes typeA{ 0%{opacity:1} 50%{opacity:0} 100%{opacity:0} }
  @keyframes typeB{ 0%{opacity:0} 50%{opacity:1} 100%{opacity:1} }
  @keyframes breathe{ 0%,100%{transform:translateY(0)} 50%{transform:translateY(-1px)} }
  @keyframes sway{ 0%,100%{transform:rotate(-6deg)} 50%{transform:rotate(6deg)} }
  @keyframes stretchb{ 0%,100%{transform:translateY(0)} 50%{transform:translateY(1.4px)} }
  @keyframes bob{ 0%,50%,100%{transform:translateY(0)} 25%,75%{transform:translateY(-0.8px)} }
  @keyframes legA{ 0%{opacity:1} 50%{opacity:0} 100%{opacity:0} }
  @keyframes legB{ 0%{opacity:0} 50%{opacity:1} 100%{opacity:1} }
  @keyframes blink{ 0%{opacity:0} 90%{opacity:0} 93%{opacity:1} 97%{opacity:0} 100%{opacity:0} }
  @keyframes rise{ 0%{opacity:0;transform:translate(0,0)} 20%{opacity:.9} 60%{opacity:.9} 100%{opacity:0;transform:translate(16px,-30px)} }
</style>
